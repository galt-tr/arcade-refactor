# BUMP Builder Deployment
#
# Consumes merkle proof events, builds BUMP proofs for mined transactions.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcade-bump-builder
  namespace: arcade
  labels:
    app.kubernetes.io/name: bump-builder
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bump-builder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bump-builder
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: arcade
          image: ghcr.io/galt-tr/arcade-refactor:latest
          args: ["--mode", "bump-builder"]
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          env:
            - name: ARCADE_KAFKA_BROKERS
              value: "kafka-0.kafka.arcade.svc.cluster.local:9092"
            - name: ARCADE_AEROSPIKE_HOSTS
              value: "aerospike-0.aerospike.arcade.svc.cluster.local:3000"
            - name: ARCADE_AEROSPIKE_NAMESPACE
              value: "arcade"
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
