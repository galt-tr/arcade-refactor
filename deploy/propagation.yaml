# Propagation Service Deployment
#
# Consumes from Kafka, broadcasts transactions to Teranode endpoints.
# Manages retry buffer for dependent transaction chains.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: arcade-propagation
  namespace: arcade
  labels:
    app.kubernetes.io/name: propagation
    app.kubernetes.io/part-of: arcade
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: propagation
  template:
    metadata:
      labels:
        app.kubernetes.io/name: propagation
        app.kubernetes.io/part-of: arcade
    spec:
      containers:
        - name: arcade
          image: ghcr.io/galt-tr/arcade-refactor:latest
          args: ["--mode", "propagation"]
          ports:
            - containerPort: 8081
              name: health
              protocol: TCP
          env:
            - name: ARCADE_KAFKA_BROKERS
              value: "kafka-0.kafka.arcade.svc.cluster.local:9092"
            - name: ARCADE_AEROSPIKE_HOSTS
              value: "aerospike-0.aerospike.arcade.svc.cluster.local:3000"
            - name: ARCADE_AEROSPIKE_NAMESPACE
              value: "arcade"
          readinessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
